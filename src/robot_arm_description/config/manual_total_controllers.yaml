controller_manager:
  ros__parameters:
    update_rate: 20
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    position_controller:
      type: forward_command_controller/ForwardCommandController

position_controller:
  ros__parameters:
    joints:
      - shoulder_lift_joint
      - elbow_joint
      - wrist_joint
      # RMD CAN ID 4, 5, 6 구동 중에는 Dynamixel 관절을 비활성화합니다.
      # Dynamixel 하드웨어 블록을 복구할 때 아래 두 관절도 함께 활성화합니다.
      # - gripper_joint
      # - base_rotate_joint
    interface_name: position

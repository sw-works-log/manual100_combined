# мқҙ нҢҢмқјмқҖ joint_state_broadcasterмҷҖ gripper_joint/base_yaw_joint position_controllerлҘј м„Өм •н•ңлӢӨ.
/**:
  controller_manager:
    ros__parameters:
      update_rate: 20  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      # мҲҳм •: gripper_jointмҷҖ base_yaw_jointлҘј мң„н•ң position лӘ…л № м»ЁнҠёлЎӨлҹ¬.
      position_controller:
        type: forward_command_controller/ForwardCommandController

  position_controller:
    ros__parameters:
      joints:
        - gripper_joint
        - base_yaw_joint
      interface_name: position
